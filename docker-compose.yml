version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mlops_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mlops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mlops_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mlflow:
    image: python:3.10-slim
    container_name: mlops_mlflow
    restart: always
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install mlflow psycopg2-binary &&
      mlflow server --backend-store-uri postgresql://user:password@db:5432/mlops_db --default-artifact-root /mlflow/artifacts --host 0.0.0.0 --port 5000"
    depends_on:
      - db
    volumes:
      - mlflow_data:/mlflow/artifacts

  prometheus:
    image: prom/prometheus:latest
    container_name: mlops_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: mlops_grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
