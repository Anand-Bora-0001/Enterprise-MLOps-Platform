apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mlops-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m" # For dataset uploads
spec:
  rules:
  - host: mlops.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: mlops-backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mlops-frontend
            port:
              number: 80
