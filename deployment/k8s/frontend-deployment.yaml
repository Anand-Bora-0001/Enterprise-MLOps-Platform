apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-frontend
  labels:
    app: mlops-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mlops-frontend
  template:
    metadata:
      labels:
        app: mlops-frontend
    spec:
      containers:
      - name: mlops-frontend
        image: mlops-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mlops-frontend
spec:
  selector:
    app: mlops-frontend
  ports:
  - port: 80
    targetPort: 80
