name: Enterprise MLOps CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Test with pytest
      run: |
        cd backend
        PYTHONPATH=. pytest

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Install dependencies
      run: |
        cd frontend
        npm install
    - name: Build frontend
      run: |
        cd frontend
        npm run build

  build-and-push-docker:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    - name: Build Backend Docker Image
      run: docker build -t mlops-backend:latest -f deployment/docker/backend.Dockerfile .
    - name: Build Frontend Docker Image
      run: docker build -t mlops-frontend:latest -f deployment/docker/frontend.Dockerfile .
    # In a real setup, we would login to DockerHub/ECR and push the images here
    # - run: docker push my-registry/mlops-backend:latest
